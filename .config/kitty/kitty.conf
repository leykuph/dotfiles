# === FONTS ===
font_family      JetBrains Mono SemiBold
bold_font        JetBrains Mono Bold
italic_font      JetBrains Mono Italic
bold_italic_font JetBrains Mono Bold Italic
font_size        12.0

# === OC PALETTE ===
background            #1A1626
foreground            #F5F0FA

cursor                #E19B5A
cursor_text_color     #1A1626
cursor_shape          beam
cursor_beam_thickness 1.5

selection_background  #AF87D7
selection_foreground  #1A1626

# === TABS ===
tab_bar_style         powerline
tab_powerline_style   slanted
tab_bar_background    #1A1626
active_tab_background #AF87D7
active_tab_foreground #1A1626
inactive_tab_background #221C34
inactive_tab_foreground #8F84A6

# === WINDOW ===
background_opacity         0.92
dynamic_background_opacity yes
window_padding_width       12

# === COLORS ===
# Black
color0  #2A2342
color8  #5E4A7F
# Red
color1  #E85A6A
color9  #E85A6A
# Green
color2  #7BC8A4
color10 #7BC8A4
# Yellow
color3  #E6A84F
color11 #F2C86A
# Purple (Blue slot repurposed)
color4  #AF87D7
color12 #C7BDD9
# Orange (Magenta slot repurposed)
color5  #E19B5A
color13 #D6A23A
# Muted (Cyan slot)
color6  #8F84A6
color14 #C7BDD9
# White
color7  #F5F0FA
color15 #F5F0FA

# === MISC ===
enable_audio_bell no
bell_on_tab       no



map alt+t                new_tab_with_cwd !neighbor
map alt+s                next_tab
map alt+a                previous_tab
map alt+w                close_tab
map ctrl+alt+s           set_tab_title
map alt+shift+left       move_tab_backward
map alt+shift+right      move_tab_forward

map alt+1 goto_tab 1
map alt+2 goto_tab 2
map alt+3 goto_tab 3
map alt+4 goto_tab 4
map alt+5 goto_tab 5
map alt+6 goto_tab 6
map alt+7 goto_tab 7
map alt+8 goto_tab 8
map alt+9 goto_tab 9
