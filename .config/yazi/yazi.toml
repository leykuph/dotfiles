[manager]
ratio          = [1, 3, 4]
sort_by        = "natural"
sort_sensitive = false
sort_reverse   = false
sort_dir_first = true
sort_translit  = false
linemode       = "size"
show_hidden    = false
show_symlink   = true
scrolloff      = 5

[preview]
tab_size         = 2
max_width        = 1200
max_height       = 900
cache_dir        = ""
image_delay      = 30
image_filter     = "triangle"
image_quality    = 90
sixel_fraction   = 15
ueberzug_scale   = 1
ueberzug_offset  = [0, 0, 0, 0]

[opener]
edit = [
  { run = 'nvim "$@"', block = true, for = "unix" },
]
open = [
  { run = 'xdg-open "$@"', desc = "Open", for = "linux" },
]
reveal = [
  { run = 'xdg-open "$(dirname "$1")"', desc = "Reveal", for = "linux" },
]
extract = [
  { run = 'unar "$1"', desc = "Extract", for = "unix" },
]
play = [
  { run = 'mpv "$@"', orphan = true, for = "unix" },
]

[open]
rules = [
  { mime = "text/*",        use = [ "edit", "reveal" ] },
  { mime = "image/*",       use = [ "open", "reveal" ] },
  { mime = "video/*",       use = [ "play", "reveal" ] },
  { mime = "audio/*",       use = [ "play", "reveal" ] },
  { mime = "application/json", use = [ "edit", "reveal" ] },
  { mime = "*/javascript",  use = [ "edit", "reveal" ] },
  { mime = "inode/x-empty", use = [ "edit", "reveal" ] },
  { name = "*",             use = [ "open", "edit", "reveal" ] },
]

[tasks]
micro_workers    = 10
macro_workers    = 25
bizarre_retry    = 5
image_alloc      = 536870912
image_bound      = [0, 0]
suppress_preload = false

[plugin]
previewers = [
  { name = "*/",    run = "folder",  sync = true  },
  { mime = "text/*",               run = "code"   },
  { mime = "*/xml",                run = "code"   },
  { mime = "*/javascript",         run = "code"   },
  { mime = "*/x-wine-extension-*", run = "code"   },
  { mime = "image/svg+xml",        run = "svg"    },
  { mime = "image/*",              run = "image"  },
  { mime = "video/*",              run = "video"  },
  { mime = "audio/*",              run = "audio"  },
  { mime = "application/json",     run = "json"   },
  { mime = "application/zip",      run = "archive"},
  { mime = "application/gzip",     run = "archive"},
  { mime = "application/x-tar",    run = "archive"},
  { mime = "application/x-bzip2",  run = "archive"},
  { mime = "application/x-7z-compressed", run = "archive" },
  { mime = "application/x-rar",    run = "archive"},
  { mime = "application/zstd",     run = "archive"},
  { name = "*",                    run = "file"   },
]

fetchers = [
  { id = "mime", name = "*", run = "mime", if = "!mime", prio = "high" },
]

[input]
cursor_blink = true

[log]
enabled = false
