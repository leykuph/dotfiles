  { name = "Music/",     text = "" , fg = "#F2C86A" },
  { name = "Videos/",    text = "" , fg = "#D6A23A" },
  { name = "Code/",      text = "" , fg = "#7BC8A4" },
  { name = "*/",         text = "" , fg = "#AF87D7" },

  # Files
  { name = "*.rs",    text = "" , fg = "#E85A6A" },
  { name = "*.py",    text = "" , fg = "#E19B5A" },
  { name = "*.js",    text = "" , fg = "#F2C86A" },
